name: Deploy Fly Probe

on:
  push:
    branches: [main]
    paths:
      - 'probe/**'
      - '.github/workflows/fly-probe.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure machines exist in both regions
        working-directory: probe
        run: |
          # Count machines per region
          MACHINES=$(flyctl machines list --json)
          SJC_COUNT=$(echo "$MACHINES" | jq '[.[] | select(.region == "sjc" and .state != "destroyed")] | length')
          AMS_COUNT=$(echo "$MACHINES" | jq '[.[] | select(.region == "ams" and .state != "destroyed")] | length')
          echo "Pre-deploy: sjc=$SJC_COUNT, ams=$AMS_COUNT"

          if [ "$AMS_COUNT" -eq 0 ] && [ "$SJC_COUNT" -gt 0 ]; then
            echo "Creating EU probe machine in ams..."
            PRIMARY_ID=$(echo "$MACHINES" | jq -r '[.[] | select(.region == "sjc" and .state != "destroyed")] | first | .id')
            flyctl machine clone "$PRIMARY_ID" --region ams
            echo "✓ EU machine created"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy to all machines
        working-directory: probe
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Wait for machine startup
        run: sleep 20

      - name: Smoke test — NA probe health
        run: |
          RESP=$(curl -sf --max-time 15 -H "fly-prefer-region: sjc" "https://ns-lol-probe.fly.dev/health")
          echo "$RESP" | jq -e '.status == "ok"'
          ROLE=$(echo "$RESP" | jq -r '.role')
          COUNT=$(echo "$RESP" | jq -r '.resolvers')
          echo "✓ NA probe OK (role: $ROLE, resolvers: $COUNT)"

      - name: Smoke test — EU probe health
        run: |
          RESP=$(curl -sf --max-time 15 -H "fly-prefer-region: ams" "https://ns-lol-probe.fly.dev/health")
          echo "$RESP" | jq -e '.status == "ok"'
          ROLE=$(echo "$RESP" | jq -r '.role')
          COUNT=$(echo "$RESP" | jq -r '.resolvers')
          echo "✓ EU probe OK (role: $ROLE, resolvers: $COUNT)"

      - name: Smoke test — NA propagation
        env:
          PROBE_AUTH_SECRET: ${{ secrets.PROBE_AUTH_SECRET }}
        run: |
          RESP=$(curl -sf --max-time 30 -H "Authorization: Bearer ${PROBE_AUTH_SECRET}" -H "fly-prefer-region: sjc" "https://ns-lol-probe.fly.dev/propagation?name=google.com&type=A")
          COUNT=$(echo "$RESP" | jq '.results | length')
          PASS=$(echo "$RESP" | jq '[.results[] | select(.rcode == "NOERROR")] | length')
          echo "✓ NA propagation: ${PASS}/${COUNT} resolvers"
          if [ "$PASS" -lt 5 ]; then echo "::error::Only ${PASS}/${COUNT} NA resolvers"; exit 1; fi

      - name: Smoke test — EU propagation
        env:
          PROBE_AUTH_SECRET: ${{ secrets.PROBE_AUTH_SECRET }}
        run: |
          RESP=$(curl -sf --max-time 30 -H "Authorization: Bearer ${PROBE_AUTH_SECRET}" -H "fly-prefer-region: ams" "https://ns-lol-probe.fly.dev/propagation?name=google.com&type=A")
          COUNT=$(echo "$RESP" | jq '.results | length')
          PASS=$(echo "$RESP" | jq '[.results[] | select(.rcode == "NOERROR")] | length')
          echo "✓ EU propagation: ${PASS}/${COUNT} resolvers"
          if [ "$PASS" -lt 3 ]; then echo "::error::Only ${PASS}/${COUNT} EU resolvers"; exit 1; fi
