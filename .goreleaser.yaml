# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: ns

before:
  hooks:
    - go mod tidy

builds:
  - id: ns
    dir: .
    main: ./cli/
    binary: ns
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - name: ns
    repository:
      owner: yokedotlol
      name: homebrew-tap
    directory: Formula
    homepage: "https://ns.lol"
    description: "Fast, API-first DNS lookup. Same engine as ns.lol."
    license: "MIT"
    install: |
      bin.install "ns"
    test: |
      assert_match "ns", shell_output("#{bin}/ns version")

release:
  github:
    owner: yokedotlol
    name: ns-lol
  prerelease: auto
  name_template: "v{{.Version}}"
